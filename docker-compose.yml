version: '3.8'
services:
  db:
    image: postgres:16
    container_name: logistics_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass2005@P
      POSTGRES_DB: mini_logistics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
